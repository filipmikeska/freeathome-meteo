name: Test & Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          TURSO_DATABASE_URL: libsql://test.turso.io
          TURSO_AUTH_TOKEN: test
        run: npm run build
