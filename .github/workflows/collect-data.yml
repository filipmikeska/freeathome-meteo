name: Collect Weather Data

on:
  schedule:
    # Každých 10 minut
    - cron: '*/10 * * * *'
  workflow_dispatch: # Ruční spuštění

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Collect data from ABB API
        env:
          ABB_API_MODE: cloud
          ABB_SYSAP_UUID: ${{ secrets.ABB_SYSAP_UUID }}
          ABB_DEVICE_ID: ${{ secrets.ABB_DEVICE_ID }}
          ABB_CLOUD_TOKEN: ${{ secrets.ABB_CLOUD_TOKEN }}
          ABB_CLOUD_SUBSCRIPTION_KEY: ${{ secrets.ABB_CLOUD_SUBSCRIPTION_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/collect-data.mjs
