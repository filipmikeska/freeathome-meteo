<!DOCTYPE html>
<html><head><title>Generate PNG Icons</title></head>
<body>
<h2>Right-click each image → Save as PNG</h2>

<div style="margin:20px">
  <h3>192x192</h3>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="cm192" width="192" height="192"></canvas>
</div>
<script>
(function(){
  var s=192, c=document.getElementById('c192'), ctx=c.getContext('2d');
  var img=new Image(); img.onload=function(){ctx.drawImage(img,0,0)};
  img.src='icon-192.svg';
  var cm=document.getElementById('cm192'), ctxm=cm.getContext('2d');
  var imgm=new Image(); imgm.onload=function(){ctxm.drawImage(imgm,0,0)};
  imgm.src='icon-maskable-192.svg';
})();
</script>

</body></html>
